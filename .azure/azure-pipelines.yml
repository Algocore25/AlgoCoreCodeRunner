# Azure Pipelines for Code Runner
trigger:
  branches:
    include:
    - main
    - develop
  tags:
    include:
    - v*

pr:
  branches:
    include:
    - main

variables:
  dockerRegistryServiceConnection: 'dockerhub'
  imageRepository: 'code-runner'
  containerRegistry: 'your-docker-username'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'

pool:
  vmImage: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build and Push Docker Image
  jobs:
  - job: Build
    displayName: Build
    steps:
    - task: Docker@2
      displayName: Build and push Docker image
      inputs:
        containerRegistry: '$(dockerRegistryServiceConnection)'
        repository: '$(imageRepository)'
        command: 'buildAndPush'
        Dockerfile: '$(dockerfilePath)'
        tags: |
          $(tag)
          latest
        addPipelineData: false

    - task: PublishBuildArtifacts@1
      displayName: Publish artifacts
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'docker-image'

- stage: DeployToStaging
  displayName: Deploy to Staging
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
  jobs:
  - deployment: DeployToStaging
    displayName: Deploy to Staging
    environment: 'staging'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebAppContainer@1
            displayName: 'Azure Web App for Containers'
            inputs:
              azureSubscription: 'your-azure-subscription'
              appName: 'code-runner-staging'
              containers: '$(containerRegistry)/$(imageRepository):$(tag)'
              appSettings: |
                - name: NODE_ENV
                  value: staging
                - name: PORT
                  value: 3000

- stage: DeployToProduction
  displayName: Deploy to Production
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: DeployToProduction
    displayName: Deploy to Production
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureWebAppContainer@1
            displayName: 'Azure Web App for Containers'
            inputs:
              azureSubscription: 'your-azure-subscription'
              appName: 'code-runner-prod'
              containers: '$(containerRegistry)/$(imageRepository):$(tag)'
              appSettings: |
                - name: NODE_ENV
                  value: production
                - name: PORT
                  value: 3000

- stage: DeployContainerApp
  displayName: Deploy to Azure Container Apps
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: DeployContainerApp
    displayName: Deploy Container App
    environment: 'container-apps'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureCLI@2
            displayName: Deploy to Container Apps
            inputs:
              azureSubscription: 'your-azure-subscription'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                # Set variables
                RESOURCE_GROUP="code-runner-rg"
                CONTAINER_APP_ENV="code-runner-env"
                CONTAINER_APP="code-runner-app"
                IMAGE="$CONTAINER_REGISTRY/$IMAGE_REPOSITORY:$TAG"
                
                # Create resource group if not exists
                az group create --name $RESOURCE_GROUP --location "eastus"
                
                # Create container app environment if not exists
                az containerapp env create \
                  --name $CONTAINER_APP_ENV \
                  --resource-group $RESOURCE_GROUP \
                  --location "eastus"
                
                # Deploy container app
                az containerapp create \
                  --name $CONTAINER_APP \
                  --resource-group $RESOURCE_GROUP \
                  --environment $CONTAINER_APP_ENV \
                  --image $IMAGE \
                  --target-port 3000 \
                  --ingress 'external' \
                  --cpu 1.0 \
                  --memory 2.0Gi \
                  --min-replicas 1 \
                  --max-replicas 10 \
                  --set-env-vars NODE_ENV=production PORT=3000
