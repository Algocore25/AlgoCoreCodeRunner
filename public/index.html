<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoCore Code Runner | Advanced Execution Engine</title>
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050810;
            --card-bg: rgba(13, 17, 28, 0.7);
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --secondary: #a855f7;
            --secondary-glow: rgba(168, 85, 247, 0.4);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.08);
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.12), transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.12), transparent 40%);
        }

        .dashboard {
            width: 95%;
            max-width: 1200px;
            margin: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            animation: fadeIn 0.8s ease-out;
        }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .title-group h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(135deg, #fff 30%, #a5b4fc 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .title-group p {
            color: var(--text-muted);
            margin: 0.2rem 0 0 0;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }

        .badge {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            color: var(--primary);
            padding: 0.4rem 1rem;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 1.5rem;
        }

        @media (max-width: 1024px) {
            .main-grid { grid-template-columns: 1fr; }
        }

        .editor-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .control-bar {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        select {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            color: #fff;
            padding: 0.7rem 1.5rem;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.95rem;
            cursor: pointer;
            outline: none;
        }

        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        .code-editor {
            background: #0d1117;
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            min-height: 450px;
            position: relative;
        }

        textarea {
            width: 100%;
            height: 400px;
            background: transparent;
            border: none;
            color: #e6edf3;
            resize: none;
            outline: none;
            line-height: 1.6;
        }

        .test-cases-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-header h3 {
            font-size: 1.1rem;
            margin: 0;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .add-case-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .add-case-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--primary);
        }

        .test-case-card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 0.8rem;
            position: relative;
        }

        .test-case-card.active {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .case-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .remove-btn {
            color: var(--error);
            cursor: pointer;
            opacity: 0.6;
        }

        .remove-btn:hover { opacity: 1; }

        .case-input {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 0.6rem;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            resize: vertical;
            min-height: 60px;
        }

        .run-btn {
            width: 100%;
            padding: 1.2rem;
            border-radius: 16px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 1rem;
            box-shadow: 0 10px 20px -5px var(--primary-glow);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .run-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px var(--primary-glow);
        }

        .run-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .results-section {
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .result-item {
            border-left: 4px solid var(--primary);
            background: rgba(255,255,255,0.03);
            padding: 1rem;
            border-radius: 4px 12px 12px 4px;
        }

        .result-item.error { border-left-color: var(--error); }
        .result-item.success { border-left-color: var(--success); }

        .result-meta {
            display: flex;
            gap: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .output-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
            padding: 0.8rem;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Status indicators */
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        .status-online { background: var(--success); box-shadow: 0 0 10px var(--success); }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="glass-panel">
            <div class="header">
                <div class="title-group">
                    <h1>AlgoCore Runner</h1>
                    <p>Performance-optimized multi-language execution</p>
                </div>
                <div>
                    <span class="badge"><span class="status-dot status-online"></span> Engine Online</span>
                </div>
            </div>

            <div class="control-bar">
                <select id="langSelect" onchange="loadSnippet()">
                    <option value="python">Python 3.10</option>
                    <option value="javascript">Node.js 18</option>
                    <option value="java">Java 17 (OpenJDK)</option>
                    <option value="cpp">C++ 20 (GCC)</option>
                    <option value="c">C 11 (GCC)</option>
                    <option value="sql">SQLite 3</option>
                </select>
                <div id="statusMsg" style="font-size: 0.85rem; color: var(--text-muted)">Ready for execution</div>
            </div>
        </div>

        <div class="main-grid">
            <!-- Left: Editor -->
            <div class="editor-section">
                <div class="code-editor">
                    <textarea id="sourceCode" spellcheck="false"></textarea>
                </div>
                <button class="run-btn" id="runBtn" onclick="runAll()">Execute All Cases</button>
            </div>

            <!-- Right: Test Cases & Results -->
            <div class="test-cases-section">
                <div class="section-header">
                    <h3>Test Cases</h3>
                    <button class="add-case-btn" onclick="addTestCase()">+ Add Case</button>
                </div>

                <div id="casesContainer">
                    <!-- Dynamic test cases will be injected here -->
                </div>

                <div class="section-header" style="margin-top: 1rem;">
                    <h3>Execution Results</h3>
                </div>
                <div id="resultsContainer">
                    <div style="text-align: center; color: var(--text-muted); padding: 2rem;">No results yet</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const snippets = {
            python: 'import sys\n\n# Read input from stdin\nfor line in sys.stdin:\n    print(f"Processed: {line.strip()}")\n\nprint("Execution complete")',
            javascript: 'const fs = require("fs");\n\nconst input = fs.readFileSync(0, "utf8");\nconsole.log(`Node received: ${input}`);\nconsole.log("Success");',
            java: 'import java.util.Scanner;\n\npublic class Main {\n    public static void main(String[] args) {\n        Scanner sc = new Scanner(System.in);\n        while(sc.hasNextLine()) {\n            System.out.println("Java output: " + sc.nextLine());\n        }\n    }\n}',
            cpp: '#include <iostream>\n#include <string>\n\nint main() {\n    std::string line;\n    while (std::getline(std::cin, line)) {\n        std::cout << "C++ Received: " << line << std::endl;\n    }\n    return 0;\n}',
            c: '#include <stdio.h>\n\nint main() {\n    char buffer[1024];\n    while (fgets(buffer, 1024, stdin)) {\n        printf("C Output: %s", buffer);\n    }\n    return 0;\n}',
            sql: 'CREATE TABLE IF NOT EXISTS demo (id INTEGER PRIMARY KEY, msg TEXT);\nINSERT INTO demo (msg) VALUES ("AlgoCore init");\nSELECT * FROM demo;'
        };

        let testCases = ["Input 1"];

        function loadSnippet() {
            const lang = document.getElementById('langSelect').value;
            document.getElementById('sourceCode').value = snippets[lang];
        }

        function renderTestCases() {
            const container = document.getElementById('casesContainer');
            container.innerHTML = testCases.map((val, idx) => `
                <div class="test-case-card">
                    <div class="case-header">
                        <span>CASE #${idx + 1}</span>
                        ${testCases.length > 1 ? `<span class="remove-btn" onclick="removeTestCase(${idx})">Remove</span>` : ''}
                    </div>
                    <textarea class="case-input" oninput="updateCaseContent(${idx}, this.value)" placeholder="Input data...">${val}</textarea>
                </div>
            `).join('');
        }

        function addTestCase() {
            testCases.push("");
            renderTestCases();
        }

        function removeTestCase(idx) {
            testCases.splice(idx, 1);
            renderTestCases();
        }

        function updateCaseContent(idx, val) {
            testCases[idx] = val;
        }

        async function runAll() {
            const btn = document.getElementById('runBtn');
            const status = document.getElementById('statusMsg');
            const resultsContainer = document.getElementById('resultsContainer');
            
            const language = document.getElementById('langSelect').value;
            const sourceCode = document.getElementById('sourceCode').value;

            btn.disabled = true;
            btn.innerText = 'EXECUTING...';
            status.innerText = 'Processing on Azure Container Apps...';
            resultsContainer.innerHTML = '<div style="text-align: center; padding: 2rem;">Executing...</div>';

            try {
                const response = await fetch('/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        language, 
                        sourceCode, 
                        input: testCases 
                    })
                });

                const data = await response.json();
                renderResults(data.results || [data]);
                status.innerText = `Completed at ${new Date().toLocaleTimeString()}`;
            } catch (err) {
                resultsContainer.innerHTML = `<div class="result-item error">Connection Error: ${err.message}</div>`;
                status.innerText = 'Execution Failed';
            } finally {
                btn.disabled = false;
                btn.innerText = 'EXECUTE ALL CASES';
            }
        }

        function renderResults(results) {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = results.map((res, idx) => `
                <div class="result-item ${res.exitCode === 0 ? 'success' : 'error'}">
                    <div class="result-meta">
                        <span>Case #${idx + 1}</span>
                        <span>Time: ${res.cpuTime}ms</span>
                        <span>Memory: ${res.memory}MB</span>
                    </div>
                    <div class="output-text" style="color: ${res.error ? '#fca5a5' : '#86efac'}">
                        ${res.output || (res.error ? `Error: ${res.error}` : 'No Output')}
                    </div>
                </div>
            `).join('');
        }

        // Initialize
        loadSnippet();
        renderTestCases();
    </script>
</body>
</html>
