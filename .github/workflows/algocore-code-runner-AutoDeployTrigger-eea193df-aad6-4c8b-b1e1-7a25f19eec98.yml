name: Trigger auto deployment for algocore-code-runner

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/algocore-code-runner-AutoDeployTrigger-eea193df-aad6-4c8b-b1e1-7a25f19eec98.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ALGOCORECODERUNNER_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.ALGOCORECODERUNNER_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.ALGOCORECODERUNNER_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/DockerFile
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: docker.io
          registryUsername: ${{ secrets.ALGOCORECODERUNNER_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.ALGOCORECODERUNNER_REGISTRY_PASSWORD }}
          containerAppName: algocore-code-runner
          resourceGroup: algocore
          imageToBuild: algocore25/algocore-code-runner:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


