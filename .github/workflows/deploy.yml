name: Build and deploy to Azure Container Apps

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout to the repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: algocore25
          password: ${{ secrets.DOCKER_PASSWORD }} # Store 'Am9R7&E4FsxE2n_' in a GitHub Secret named DOCKER_PASSWORD

      - name: Build and push container image to registry
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: algocore25/multilang:${{ github.sha }}
          file: ./Dockerfile
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Container Apps (Production)
        if: github.ref == 'refs/heads/main'
        uses: azure/container-apps-deploy-action@v1
        with:
          imageToDeploy: algocore25/multilang:${{ github.sha }}
          resourceGroup: code-runner-rg
          containerAppName: code-runner-app
          containerAppEnvironment: code-runner-env

      - name: Deploy to Azure Container Apps (Staging)
        if: github.ref == 'refs/heads/develop'
        uses: azure/container-apps-deploy-action@v1
        with:
          imageToDeploy: algocore25/multilang:${{ github.sha }}
          resourceGroup: code-runner-rg
          containerAppName: code-runner-staging # Assuming you have a staging app
          containerAppEnvironment: code-runner-env
